<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>myfriend · 后端接口说明</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#15132e; --ink2:#211f44; --rail:#1a1838;
  --paper:#f5f6fa; --card:#ffffff; --line:#e6e7ef;
  --text:#23233a; --muted:#75768f; --faint:#9a9bb2;
  --accent:#ff6a4d; --accent-soft:#fff0ec;
  --get:#2ea66b; --post:#3b76f0; --put:#d98a18; --patch:#8b5cf6; --delete:#e0524a;
  --get-bg:#e8f6ee; --post-bg:#eaf1fe; --put-bg:#fdf3e2; --patch-bg:#f1ecfe; --delete-bg:#fdecea;
  --mono:'JetBrains Mono',ui-monospace,Menlo,Consolas,monospace;
  --disp:'Space Grotesk','Noto Sans SC',system-ui,sans-serif;
  --body:'Noto Sans SC','Space Grotesk',system-ui,sans-serif;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{margin:0;background:var(--paper);color:var(--text);font-family:var(--body);font-size:14.5px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
/* layout */
.wrap{display:grid;grid-template-columns:288px 1fr;min-height:100vh}
/* sidebar */
aside{position:sticky;top:0;height:100vh;background:var(--ink);color:#cfd0e6;display:flex;flex-direction:column;overflow:hidden}
.brand{padding:22px 22px 16px;border-bottom:1px solid #2a2850}
.brand .logo{font-family:var(--disp);font-weight:700;font-size:21px;color:#fff;letter-spacing:-.5px;display:flex;align-items:center;gap:9px}
.brand .logo .dot{width:11px;height:11px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 4px rgba(255,106,77,.18)}
.brand .tag{font-size:12px;color:#8f90b5;margin-top:5px;font-family:var(--mono)}
.searchbox{padding:14px 16px}
.searchbox input{width:100%;background:#100f26;border:1px solid #2f2d57;color:#e8e8f6;border-radius:9px;padding:9px 12px;font-family:var(--body);font-size:13.5px;outline:none}
.searchbox input:focus{border-color:var(--accent)}
.searchbox input::placeholder{color:#6b6c8d}
nav{flex:1;overflow-y:auto;padding:4px 10px 20px}
nav::-webkit-scrollbar{width:8px}nav::-webkit-scrollbar-thumb{background:#2c2a52;border-radius:8px}
.navitem{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 12px;border-radius:8px;cursor:pointer;color:#b9bad6;font-size:13.5px}
.navitem:hover{background:#221f47;color:#fff}
.navitem.active{background:var(--accent);color:#fff}
.navitem.active .cnt{background:rgba(255,255,255,.25);color:#fff}
.navitem .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.navitem .cnt{font-family:var(--mono);font-size:11px;background:#2a2850;color:#9a9bc4;border-radius:20px;padding:1px 8px;min-width:26px;text-align:center}
.foot{padding:12px 20px;border-top:1px solid #2a2850;font-size:11.5px;color:#6d6e92;font-family:var(--mono)}
/* main */
main{padding:0 0 80px}
header.hero{padding:46px 56px 30px;background:linear-gradient(180deg,#fff, var(--paper));border-bottom:1px solid var(--line)}
header.hero h1{font-family:var(--disp);font-size:34px;font-weight:700;letter-spacing:-1px;margin:0 0 8px}
header.hero p{margin:0;color:var(--muted);max-width:680px}
.stats{display:flex;gap:26px;margin-top:22px;flex-wrap:wrap}
.stat{display:flex;flex-direction:column}
.stat b{font-family:var(--disp);font-size:26px;color:var(--ink);line-height:1}
.stat span{font-size:12px;color:var(--faint);margin-top:4px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.5px}
.note{margin:18px 56px 0;padding:13px 16px;background:var(--accent-soft);border:1px solid #ffd9cf;border-radius:10px;font-size:13px;color:#9c4733}
.note b{color:#7a3322}
.content{padding:8px 56px}
section.mod{padding:34px 0 6px;border-bottom:1px solid var(--line)}
section.mod:last-child{border-bottom:none}
.modhead{display:flex;align-items:baseline;gap:12px;margin-bottom:4px}
.modhead h2{font-family:var(--disp);font-size:22px;font-weight:600;margin:0;letter-spacing:-.4px}
.modhead .mcount{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--accent-soft);padding:2px 9px;border-radius:20px;font-weight:500}
.modhead .msub{color:var(--muted);font-size:13px}
/* endpoint card */
.ep{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:13px 0;overflow:hidden;transition:box-shadow .15s,border-color .15s}
.ep:hover{box-shadow:0 4px 18px rgba(20,18,46,.06)}
.ep.open{border-color:#d7d9e8}
.eprow{display:flex;align-items:center;gap:14px;padding:13px 16px;cursor:pointer;user-select:none}
.method{font-family:var(--mono);font-weight:600;font-size:11.5px;letter-spacing:.5px;padding:4px 9px;border-radius:6px;min-width:62px;text-align:center;flex:none}
.m-GET{color:var(--get);background:var(--get-bg)} .m-POST{color:var(--post);background:var(--post-bg)}
.m-PUT{color:var(--put);background:var(--put-bg)} .m-PATCH{color:var(--patch);background:var(--patch-bg)}
.m-DELETE{color:var(--delete);background:var(--delete-bg)}
.epath{font-family:var(--mono);font-size:13.5px;color:var(--ink2);font-weight:500;word-break:break-all}
.epath .pv{color:var(--accent);font-weight:600}
.edesc{color:var(--muted);font-size:13px;margin-left:auto;text-align:right;max-width:42%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:none}
.lock{font-size:11px;color:var(--faint);flex:none}
.chev{flex:none;color:var(--faint);transition:transform .18s;font-size:12px}
.ep.open .chev{transform:rotate(90deg)}
.epbody{display:none;padding:4px 18px 20px;border-top:1px dashed var(--line)}
.ep.open .epbody{display:block}
.epbody .full{color:var(--text);font-size:13.5px;white-space:pre-wrap;margin:14px 0 4px;padding:11px 13px;background:#fafafe;border-left:3px solid var(--accent);border-radius:0 7px 7px 0}
.blk{margin-top:16px}
.blk .lbl{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--faint);margin-bottom:7px;display:flex;align-items:center;gap:7px}
.blk .lbl .pill{background:#eef0f6;color:var(--muted);border-radius:20px;padding:1px 7px;font-size:10px}
table.params{width:100%;border-collapse:collapse;font-size:13px}
table.params th{text-align:left;font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--faint);font-weight:500;padding:6px 10px;border-bottom:1px solid var(--line)}
table.params td{padding:7px 10px;border-bottom:1px solid #f1f2f7;vertical-align:top}
table.params tr:last-child td{border-bottom:none}
.pname{font-family:var(--mono);font-weight:600;color:var(--ink2)}
.ptype{font-family:var(--mono);font-size:12px;color:var(--post)}
.preq{font-size:10px;font-family:var(--mono);color:var(--delete);background:var(--delete-bg);padding:1px 6px;border-radius:5px;margin-left:6px}
.popt{font-size:10px;font-family:var(--mono);color:var(--muted);background:#eef0f6;padding:1px 6px;border-radius:5px;margin-left:6px}
.pdesc{color:var(--muted)}
.resp{font-family:var(--mono);font-size:12.5px;color:var(--get);background:var(--get-bg);display:inline-block;padding:3px 10px;border-radius:7px}
.respj{font-family:var(--mono);font-size:12.5px;color:var(--muted)}
.empty{color:var(--faint);font-size:12.5px;font-style:italic}
.toTop{position:fixed;right:26px;bottom:26px;background:var(--ink);color:#fff;width:42px;height:42px;border-radius:50%;display:none;align-items:center;justify-content:center;cursor:pointer;font-size:18px;box-shadow:0 6px 20px rgba(20,18,46,.25)}
.toTop.show{display:flex}
.nohit{padding:40px;text-align:center;color:var(--faint)}
@media(max-width:900px){
 .wrap{grid-template-columns:1fr}
 aside{position:static;height:auto;flex-direction:column}
 nav{max-height:none}
 header.hero,.content,.note{padding-left:22px;padding-right:22px}
 .edesc{display:none}
}
</style>
</head>
<body>
<div class="wrap">
  <aside>
    <div class="brand">
      <div class="logo"><span class="dot"></span>myfriend</div>
      <div class="tag">REST API · 后端接口说明</div>
    </div>
    <div class="searchbox"><input id="q" type="search" placeholder="搜索路径 / 描述 / 方法…" autocomplete="off"></div>
    <nav id="nav"></nav>
    <div class="foot">FastAPI · 前缀 <b>/api</b></div>
  </aside>
  <main>
    <header class="hero">
      <h1>后端接口说明</h1>
      <p>myfriend 是一个带长期记忆、情绪感知与多角色对话的 AI 伙伴应用。以下接口由后端 <code>controllers</code> 自动梳理，按业务模块归类，统一挂载在 <code>/api</code> 前缀下，多数接口需登录态（Bearer Token）。</p>
      <div class="stats">
        <div class="stat"><b id="s_total"></b><span>接口总数</span></div>
        <div class="stat"><b id="s_mod"></b><span>业务模块</span></div>
        <div class="stat"><b>35</b><span>数据表</span></div>
        <div class="stat"><b>4</b><span>存储引擎</span></div>
      </div>
    </header>
    <div class="note">🔒 标记 <b>需登录</b> 的接口要求请求头携带 <b>Authorization: Bearer &lt;access_token&gt;</b>；公开分享（<b>/api/public/*</b>）与健康检查无需鉴权。请求体均为 <b>JSON</b>（文件上传除外）。</div>
    <div class="content" id="content"></div>
  </main>
</div>

function methodCls(m){return 'm-'+m}
function hlPath(p){return p.replace(/\{(\w+)\}/g,'<span class="pv">{$1}</span>')}

function paramTable(rows){
  let h='<table class="params"><thead><tr><th>参数</th><th>类型</th><th>必填</th><th>说明</th></tr></thead><tbody>';
  for(const r of rows){
    h+=`<tr><td class="pname">${r.name}</td><td class="ptype">${r.type||'-'}</td><td>${r.req?'<span class="preq">必填</span>':'<span class="popt">可选</span>'}</td><td class="pdesc">${r.desc||''}</td></tr>`;
  }
  return h+'</tbody></table>';
}

function renderBodyFields(fields){
  const rows=fields.map(f=>{
    const req = (f.default===null || f.default===undefined);
    let dft = (f.default!==null&&f.default!==undefined)?(' · 默认 '+f.default):'';
    return {name:f.name, type:(f.type||'').replace('| None',' 可空'), req:req, desc:(f.comment||'')+dft};
  });
  return paramTable(rows);
}

function epCard(e){
  const auth = e.auth?'<span class="lock">🔒 需登录</span>':'';
  let body='';
  // full description
  const full = e.doc && e.doc.length>0 ? e.doc : '';
  if(full && full!==e.desc) body+=`<div class="full">${full.replace(/</g,'&lt;')}</div>`;
  // path params
  if(e.path_params.length){
    const rows=e.path_params.map(p=>({name:p,type:'path',req:true,desc:'路径参数'}));
    body+=`<div class="blk"><div class="lbl">路径参数 <span class="pill">${rows.length}</span></div>${paramTable(rows)}</div>`;
  }
  // query
  if(e.query.length){
    const rows=e.query.map(p=>({name:p.name,type:p.type,req:(p.default===null||p.default===undefined),desc:(p.default!==null&&p.default!==undefined)?('默认 '+p.default):''}));
    body+=`<div class="blk"><div class="lbl">查询参数 <span class="pill">${rows.length}</span></div>${paramTable(rows)}</div>`;
  }
  // form/files
  if(e.form_files.length){
    const rows=e.form_files.map(p=>({name:p.name,type:p.type,req:true,desc:'multipart/form-data 上传'}));
    body+=`<div class="blk"><div class="lbl">表单 / 文件 <span class="pill">multipart</span></div>${paramTable(rows)}</div>`;
  }
  // body
  if(e.body_schema){
    let inner='';
    if(e.body_fields && e.body_fields.length){ inner=renderBodyFields(e.body_fields); }
    else { inner=`<div class="empty">请求体模型：<b>${e.body_schema}</b></div>`; }
    body+=`<div class="blk"><div class="lbl">请求体 (JSON) <span class="pill">${e.body_schema.replace(' | None','')}</span></div>${inner}</div>`;
  }
  // response
  let resp = e.resp ? `<span class="resp">${e.resp}</span>` : '<span class="respj">JSON 对象 / 列表（见对应业务模型）</span>';
  body+=`<div class="blk"><div class="lbl">返回</div>${resp}</div>`;

  if(!body) body='<div class="empty" style="margin-top:14px">无额外参数。</div>';

  return `<div class="ep" data-search="${(e.method+' '+e.path+' '+e.desc).toLowerCase()}">
    <div class="eprow">
      <span class="method ${methodCls(e.method)}">${e.method}</span>
      <span class="epath">${hlPath(e.path)}</span>
      <span class="edesc">${e.desc||''}</span>
      ${auth}
      <span class="chev">▶</span>
    </div>
    <div class="epbody">${body}</div>
  </div>`;
}

// render nav
const nav=document.getElementById('nav');
nav.innerHTML=mlist.map((m,i)=>`<div class="navitem" data-i="${i}" onclick="goMod('${m.tag}')"><span class="nm">${m.cn}</span><span class="cnt">${m.count}</span></div>`).join('');

// render content
const content=document.getElementById('content');
content.innerHTML=mlist.map(m=>`<section class="mod" id="mod-${m.tag}">
  <div class="modhead"><h2>${m.cn}</h2><span class="mcount">${m.count} 个接口</span><span class="msub">${m.sub}</span></div>
  ${m.endpoints.map(epCard).join('')}
</section>`).join('');

// expand/collapse
content.addEventListener('click',ev=>{
  const row=ev.target.closest('.eprow'); if(!row) return;
  row.parentElement.classList.toggle('open');
});

function goMod(tag){
  const el=document.getElementById('mod-'+tag);
  if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// scroll spy
const navitems=[...document.querySelectorAll('.navitem')];
const secs=mlist.map(m=>document.getElementById('mod-'+m.tag));
const io=new IntersectionObserver(es=>{
  es.forEach(e=>{ if(e.isIntersecting){
    const tag=e.target.id.replace('mod-','');
    navitems.forEach(n=>n.classList.toggle('active', mlist[+n.dataset.i].tag===tag));
  }});
},{rootMargin:'-10% 0px -80% 0px'});
secs.forEach(s=>s&&io.observe(s));

// search
const q=document.getElementById('q');
q.addEventListener('input',()=>{
  const t=q.value.trim().toLowerCase();
  let anyMod;
  document.querySelectorAll('section.mod').forEach(sec=>{
    let shown=0;
    sec.querySelectorAll('.ep').forEach(ep=>{
      const hit=!t || ep.dataset.search.includes(t);
      ep.style.display=hit?'':'none';
      if(hit) shown++;
    });
    sec.style.display=shown?'':'none';
  });
});

// back to top
const toTop=document.getElementById('toTop');
addEventListener('scroll',()=>{toTop.classList.toggle('show',scrollY>500)});
toTop.onclick=()=>scrollTo({top:0,behavior:'smooth'});
</script>
</body>
</html>
